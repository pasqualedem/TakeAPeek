<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6fa8"/>
      <stop offset="100%" stop-color="#0d4d7a"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="32" height="32" rx="7"/>
    </clipPath>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <g clip-path="url(#clip)">
    <!-- eye whites -->
    <path d="M2 16 C7 8, 25 8, 30 16 C25 24, 7 24, 2 16 Z" fill="white"/>
    <!-- iris -->
    <circle cx="16" cy="16" r="5.5" fill="#0d4d7a"/>
    <!-- pupil -->
    <circle cx="16" cy="16" r="2.8" fill="#1a1a2e"/>
    <!-- specular highlight -->
    <circle cx="18.2" cy="13.8" r="1.4" fill="white" opacity="0.85"/>
  </g>
</svg>
